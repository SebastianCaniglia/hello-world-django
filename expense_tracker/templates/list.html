{% extends "base.html" %}
{% block content %}
<h2>All Expenses</h2>
<table>
    <tr><th>Date</th><th>Description</th><th>Amount</th></tr>
    {% for expense in expenses %}
        <tr><td>{{ expense.date }}</td><td>{{ expense.description }}</td><td>${{ expense.amount }}</td></tr>
    {% empty %}
        <tr><td colspan="3">No expenses yet.</td></tr>
    {% endfor %}
</table>
{% endblock %}
